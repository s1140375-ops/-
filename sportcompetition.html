<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>森林運動會：三關完整版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全域重置 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        body {
            font-family: 'Noto Sans TC', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(145deg, #f9f1e0 0%, #e8dcc0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #fef8ed;
            border-radius: 60px 60px 40px 40px;
            padding: 24px 30px 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 6px 12px rgba(0, 0, 0, 0.05);
            border: 4px solid #d9b382;
            position: relative;
            transition: all 0.2s;
        }

        /* ===== 共用元件 ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px 16px;
            margin-bottom: 12px;
        }

        .title {
            font-size: clamp(1.4rem, 4.5vw, 2.2rem);
            font-weight: 900;
            color: #4a3a2a;
            text-shadow: 4px 4px 0 #f3d59b, 0 2px 8px rgba(0, 0, 0, 0.08);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .title span {
            background: #ffd966;
            padding: 0 12px;
            border-radius: 40px;
            font-size: 0.6em;
            color: #4a3a2a;
        }

        .voice-btn {
            background: #b7d7a8;
            border: none;
            border-radius: 60px;
            padding: 10px 22px;
            font-size: clamp(1rem, 2.2vw, 1.3rem);
            font-weight: 700;
            color: #2d4a1e;
            box-shadow: 0 4px 0 #7fa06d, 0 6px 12px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.08s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #e5f0d8;
            touch-action: manipulation;
        }
        .voice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7fa06d;
        }
        .voice-btn:focus-visible {
            outline: 3px solid #f3b33d;
        }

        .dialog-box {
            background: #fffcf0;
            border-radius: 30px;
            padding: 18px 24px;
            margin-bottom: 20px;
            border: 3px solid #d9b382;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04), 0 4px 8px rgba(0, 0, 0, 0.04);
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            line-height: 1.7;
            color: #3d3224;
            min-height: 80px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .dialog-box .dialog-icon {
            font-size: 2rem;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .dialog-box .dialog-text {
            flex: 1;
        }

        .level {
            display: block;
        }
        .level.hidden {
            display: none;
        }

        /* ============================================================ */
        /* 第一關樣式（略，保留原有） */
        /* ============================================================ */
        .teams-area {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .team-card {
            flex: 1 1 240px;
            min-width: 200px;
            background: #fcf6ea;
            border-radius: 40px;
            padding: 20px 16px 18px;
            border: 4px solid #d9b382;
            box-shadow: 0 8px 0 #b8956a, 0 10px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
        }
        .team-card.elephant {
            border-color: #8fb5a0;
            box-shadow: 0 8px 0 #6d8f7a, 0 10px 20px rgba(0, 0, 0, 0.06);
        }
        .team-card.squirrel {
            border-color: #d4a373;
            box-shadow: 0 8px 0 #b5835a, 0 10px 20px rgba(0, 0, 0, 0.06);
        }
        .team-card .animal-icon {
            font-size: 3.6rem;
            line-height: 1.2;
            display: block;
        }
        .team-card .team-name {
            font-size: 1.3rem;
            font-weight: 900;
            color: #3d3224;
            margin: 2px 0 2px;
        }
        .team-card .team-hint {
            font-size: 1rem;
            font-weight: 700;
            color: #6b4f34;
            background: #f1e4d2;
            border-radius: 30px;
            padding: 4px 14px;
            display: inline-block;
            margin: 4px 0 10px;
        }
        .drop-zone {
            min-height: 58px;
            border-radius: 24px;
            background: rgba(200, 180, 160, 0.15);
            border: 3px dashed #c9b69a;
            margin: 10px 0 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            position: relative;
        }
        .drop-zone.highlight {
            background: rgba(180, 220, 160, 0.35);
            border-color: #7dba6b;
            box-shadow: 0 0 20px rgba(125, 186, 107, 0.25);
        }
        .drop-zone.correct-glow {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.15);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.35);
            border-style: solid;
            animation: glowPulse 1.2s ease-in-out 2;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(76, 175, 80, 0.25);
            }
            50% {
                box-shadow: 0 0 50px rgba(76, 175, 80, 0.6);
            }
        }
        .drop-zone .placed-stick {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 6px 0;
        }
        .drop-zone .placed-stick .stick-inner {
            height: 30px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .stick-placed {
            display: inline-block;
            height: 30px;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
        }
        .stick-placed.red {
            width: 200px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        .stick-placed.blue {
            width: 90px;
            background: linear-gradient(135deg, #3498db, #2c6b9e);
        }

        .tray-area {
            background: #d9b382;
            background-image: repeating-linear-gradient(90deg,
                    #d9b382 0px, #d9b382 8px,
                    #c9a072 8px, #c9a072 16px);
            border-radius: 50px 50px 30px 30px;
            padding: 20px 24px 18px;
            border: 4px solid #b8956a;
            box-shadow: inset 0 -6px 0 #a87d56, 0 8px 20px rgba(0, 0, 0, 0.10);
            margin-top: 6px;
            position: relative;
        }
        .tray-label {
            position: absolute;
            top: -12px;
            left: 30px;
            background: #fef8ed;
            padding: 0 16px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #6b4f34;
            border-radius: 30px;
            border: 2px solid #b8956a;
            line-height: 1.8;
        }
        .tray-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            padding: 8px 0 4px;
            min-height: 110px;
            position: relative;
        }
        .stick-wrapper {
            position: relative;
            height: 40px;
            width: 100%;
            display: flex;
            align-items: center;
            transition: opacity 0.25s;
        }
        .stick-wrapper.hidden-stick {
            opacity: 0;
            pointer-events: none;
        }
        .stick {
            height: 30px;
            border-radius: 30px;
            cursor: grab;
            touch-action: none;
            will-change: transform;
            transition: box-shadow 0.2s, opacity 0.2s;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
            transform: translate(0, 0);
            flex-shrink: 0;
        }
        .stick.red {
            width: 200px;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            border: 2px solid #a93226;
        }
        .stick.blue {
            width: 90px;
            background: linear-gradient(145deg, #5dade2, #2c6b9e);
            border: 2px solid #1a4f7a;
        }
        .stick.dragging {
            cursor: grabbing;
            opacity: 0.85 !important;
            z-index: 1000 !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.30), 0 0 0 4px rgba(255, 215, 0, 0.3) !important;
            transition: none !important;
            transform-origin: center center;
        }
        .stick.placed {
            cursor: default;
            pointer-events: none;
            opacity: 0.6;
            filter: grayscale(0.2);
        }

        /* ============================================================ */
        /* 第二關樣式（動物面向終點） */
        /* ============================================================ */
        .race-area {
            background: #e6dcc8;
            border-radius: 40px;
            padding: 20px 20px 18px;
            border: 4px solid #b8956a;
            box-shadow: inset 0 0 0 4px #cdb89e, 0 8px 0 #a07d5c;
            margin-bottom: 28px;
            position: relative;
            min-height: 280px;
        }
        .track {
            position: relative;
            height: 80px;
            margin-bottom: 12px;
            background: #b9a88c;
            border-radius: 30px;
            background-image: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.1) 0px,
                    rgba(255, 255, 255, 0.1) 20px,
                    transparent 20px,
                    transparent 40px);
            border: 3px solid #8f7a5e;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        .track:last-child {
            margin-bottom: 0;
        }
        .track-label {
            position: absolute;
            left: 8px;
            top: -10px;
            background: #fef8ed;
            padding: 0 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #4a3a2a;
            border: 2px solid #b8956a;
            line-height: 1.6;
            z-index: 2;
        }
        .track-content {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .runner {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 2.8rem;
            line-height: 1;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 10px 4px 6px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
            white-space: nowrap;
        }
        /* 動物面朝右（終點） */
        .runner .animal-emoji {
            font-size: 2.6rem;
            line-height: 1.2;
            display: inline-block;
            transform: scaleX(-1);
            /* 水平翻轉，面向右側 */
        }
        .runner.elephant {
            left: calc(100% - 50px - 80px);
        }
        .runner.squirrel {
            left: calc(100% - 400px - 80px);
        }
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background: repeating-linear-gradient(180deg,
                    #e74c3c 0px,
                    #e74c3c 10px,
                    #fff 10px,
                    #fff 20px);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 4px;
        }
        .finish-line .flag {
            font-size: 1.4rem;
            line-height: 1.2;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 0 4px;
            margin-top: -8px;
        }
        .finish-line .label {
            font-size: 0.7rem;
            font-weight: 900;
            color: #fff;
            background: #e74c3c;
            padding: 2px 6px;
            border-radius: 10px;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
            margin-top: 4px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .reward-on-runner {
            font-size: 2rem;
            position: absolute;
            top: -20px;
            right: -10px;
            z-index: 5;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .reward-on-runner.show {
            display: block;
        }
        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        /* 慶祝動畫（保留翻轉） */
        @keyframes celebrateJump {
            0%,
            100% {
                transform: translateY(0) rotate(0deg) scaleX(-1);
            }
            30% {
                transform: translateY(-10px) rotate(-8deg) scaleX(-1);
            }
            60% {
                transform: translateY(-5px) rotate(8deg) scaleX(-1);
            }
        }
        @keyframes cheerPunch {
            0%,
            100% {
                transform: scale(1) rotate(0deg) scaleX(-1);
            }
            50% {
                transform: scale(1.2) rotate(-10deg) scaleX(-1);
            }
        }
        .runner.celebrate .animal-emoji {
            animation: celebrateJump 0.6s ease 3;
        }
        .runner.cheer .animal-emoji {
            animation: cheerPunch 0.5s ease 3;
        }
        .track.highlight {
            background: #c5b89a;
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3);
            border-color: #f3b33d;
        }

        .reward-item {
            font-size: 3.6rem;
            cursor: grab;
            touch-action: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 60px;
            border: 4px solid #fef8ed;
            box-shadow: 0 6px 0 #b8956a, 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #4a3a2a;
            line-height: 1;
            position: relative;
        }
        .reward-item .label-text {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 0 12px;
            border-radius: 30px;
        }
        .reward-item.dragging {
            cursor: grabbing;
            opacity: 0.8 !important;
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 0 0 6px rgba(255, 215, 0, 0.3) !important;
            z-index: 1000;
            transition: none !important;
        }
        .reward-item.hidden-item {
            opacity: 0;
            pointer-events: none;
        }

        /* ============================================================ */
        /* 第三關樣式（略，保留原有） */
        /* ============================================================ */
        .level3-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 10px;
            min-height: 300px;
            align-items: stretch;
        }
        .shelf-zone {
            flex: 1 1 55%;
            background: #e6f0fa;
            border-radius: 40px;
            border: 4px solid #7fa9c4;
            box-shadow: inset 0 0 0 4px #c5d9e8, 0 8px 0 #5a7d94;
            padding: 20px 20px 20px 0;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }
        .shelf-zone .zone-label {
            position: absolute;
            top: -14px;
            left: 20px;
            background: #fef8ed;
            padding: 0 16px;
            border-radius: 30px;
            font-weight: 700;
            color: #2a4a5e;
            border: 2px solid #7fa9c4;
            line-height: 1.8;
            font-size: 0.9rem;
        }
        .blue-line {
            position: absolute;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 6px;
            background: #3498db;
            box-shadow: 0 0 15px #3498db, 0 0 30px rgba(52, 152, 219, 0.3);
            border-radius: 4px;
            z-index: 2;
            pointer-events: none;
        }
        .blue-line::after {
            content: '起點';
            position: absolute;
            bottom: -26px;
            left: -10px;
            font-size: 0.7rem;
            font-weight: 900;
            color: #1a4f7a;
            background: rgba(255, 255, 255, 0.7);
            padding: 0 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .shelf-inner {
            width: 100%;
            height: 100%;
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
            position: relative;
            min-height: 200px;
        }
        .shelf-slot {
            height: 38px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            border: 2px dashed rgba(52, 152, 219, 0.3);
            display: flex;
            align-items: center;
            padding-left: 10px;
            position: relative;
            transition: background 0.3s;
        }
        .shelf-slot .slot-label {
            font-size: 0.7rem;
            color: #7f8c8d;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .shelf-slot .placed-bar {
            height: 28px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .shelf-slot .placed-bar.yellow {
            background: #f1c40f;
            width: 260px;
        }
        .shelf-slot .placed-bar.green {
            background: #2ecc71;
            width: 160px;
        }
        .shelf-slot .placed-bar.orange {
            background: #e67e22;
            width: 210px;
        }
        .shelf-slot .placed-bar .label-long {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #c0392b;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.8);
            padding: 0 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .shelf-slot .placed-bar .label-short {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #2980b9;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.8);
            padding: 0 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .bars-pool {
            flex: 1 1 35%;
            background: #fcf6ea;
            border-radius: 40px;
            border: 4px solid #d9b382;
            box-shadow: inset 0 0 0 4px #f5e6d0, 0 8px 0 #b8956a;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            min-height: 280px;
            position: relative;
        }
        .bars-pool .pool-label {
            position: absolute;
            top: -14px;
            left: 20px;
            background: #fef8ed;
            padding: 0 16px;
            border-radius: 30px;
            font-weight: 700;
            color: #6b4f34;
            border: 2px solid #d9b382;
            line-height: 1.8;
            font-size: 0.9rem;
        }
        .pool-bar {
            height: 30px;
            border-radius: 30px;
            cursor: grab;
            touch-action: none;
            will-change: transform;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            transition: box-shadow 0.2s, opacity 0.2s;
            flex-shrink: 0;
            border: 2px solid rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .pool-bar.yellow {
            width: 260px;
            background: linear-gradient(145deg, #f1c40f, #d4a800);
            border-color: #b38f00;
            transform: translateX(40px);
        }
        .pool-bar.green {
            width: 160px;
            background: linear-gradient(145deg, #2ecc71, #1e8b4c);
            border-color: #146b3a;
            transform: translateX(0px);
        }
        .pool-bar.orange {
            width: 210px;
            background: linear-gradient(145deg, #e67e22, #b85e0f);
            border-color: #8f4a0a;
            transform: translateX(20px);
        }
        .pool-bar.dragging {
            cursor: grabbing;
            opacity: 0.85 !important;
            z-index: 1000 !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.30), 0 0 0 4px rgba(255, 215, 0, 0.3) !important;
            transition: none !important;
        }
        .pool-bar.hidden-item {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== 提示框與慶祝（共用） ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .toast-overlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .toast-box {
            background: #fffcf0;
            border-radius: 60px;
            padding: 32px 40px 28px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            border: 5px solid #d9b382;

    <!-- ============================================================ -->
    <!-- JavaScript（整合三關） -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // 共用功能（Toast, Celebrate, 語音, 灑花）
        // =============================================================
        (function() {
            'use strict';

            function speakText(text, callback) {
                if (!window.speechSynthesis) {
                    if (callback) callback();
                    return;
                }
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                const voices = window.speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.startsWith('zh'));
                if (zhVoice) utterance.voice = zhVoice;
                utterance.onend = function() { if (callback) callback(); };
                utterance.onerror = function() { if (callback) callback(); };
                window.speechSynthesis.speak(utterance);
            }

            const toastOverlay = document.getElementById('toastOverlay');
            const toastEmoji = document.getElementById('toastEmoji');
            const toastTitle = document.getElementById('toastTitle');
            const toastMsg = document.getElementById('toastMsg');
            const toastBtn = document.getElementById('toastBtn');

            function showToast(emoji, title, message) {
                toastEmoji.textContent = emoji || '🤔';
                toastTitle.textContent = title || '再試一次';
                toastMsg.textContent = message || '再想想看喔！';
                toastOverlay.classList.add('show');
            }

            function hideToast() {
                toastOverlay.classList.remove('show');
            }
            toastBtn.addEventListener('click', hideToast);
            toastOverlay.addEventListener('click', function(e) {
                if (e.target === toastOverlay) hideToast();
            });

            const celebrateOverlay = document.getElementById('celebrateOverlay');
            const celebrateEmoji = document.getElementById('celebrateEmoji');
            const celebrateTitle = document.getElementById('celebrateTitle');
            const celebrateDesc = document.getElementById('celebrateDesc');
            const celebrateBtn = document.getElementById('celebrateBtn');

            // 修改 showCelebration，確保按鈕文字正確設置
            function showCelebration(emoji, title, desc, btnText, btnCallback) {
                celebrateEmoji.textContent = emoji || '🏆🎉';
                celebrateTitle.textContent = title || '恭喜通關！';
                if (desc) {
                    celebrateDesc.style.display = 'block';
                    celebrateDesc.textContent = desc;
                } else {
                    celebrateDesc.style.display = 'none';
                }
                // 先設置文字，再克隆
                celebrateBtn.textContent = btnText || '🚀 前進下一關 ➡️';
                celebrateBtn.replaceWith(celebrateBtn.cloneNode(true));
                const newBtn = document.getElementById('celebrateBtn');
                // 再次設置文字，確保克隆後文字正確
                newBtn.textContent = btnText || '🚀 前進下一關 ➡️';
                newBtn.addEventListener('click', function(e) {
                    if (btnCallback) btnCallback(e);
                });
                celebrateOverlay.classList.add('show');
                launchConfetti();
            }

            function hideCelebration() {
                celebrateOverlay.classList.remove('show');
            }

            function launchConfetti() {
                const container = document.getElementById('confettiContainer');
                container.innerHTML = '';
                const colors = ['#f44336', '#e91e63', '#9c27b0', '#3f51b5', '#4caf50', '#ffeb3b', '#ff9800', '#00bcd4'];
                for (let i = 0; i < 80; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = 6 + Math.random() * 10;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 1.2;
                    const duration = 2 + Math.random() * 2.5;
                    const rotate = Math.random() * 360;
                    el.style.cssText =
                        `
                        left: ${left}%;
                        width: ${size}px;
                        height: ${size * (0.6 + Math.random() * 0.8)}px;
                        background: ${color};
                        animation-duration: ${duration}s;
                        animation-delay: ${delay}s;
                        transform: rotate(${rotate}deg);
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    `;
                    container.appendChild(el);
                }
                setTimeout(() => container.innerHTML = '', 5000);
            }

            window.speakText = speakText;
            window.showToast = showToast;
            window.hideToast = hideToast;
            window.showCelebration = showCelebration;
            window.hideCelebration = hideCelebration;
            window.launchConfetti = launchConfetti;

            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = function() {
                    window.speechSynthesis.getVoices();
                };
            }
            console.log('共用系統已載入');
        })();

        // =============================================================
        // 第一關邏輯（完整）
        // =============================================================
        (function() {
            'use strict';

            const stickRed = document.getElementById('stickRed');
            const stickBlue = document.getElementById('stickBlue');
            const wrapperRed = document.getElementById('wrapperRed');
            const wrapperBlue = document.getElementById('wrapperBlue');
            const dropElephant = document.getElementById('dropElephant');
            const dropSquirrel = document.getElementById('dropSquirrel');
            const dialogText = document.getElementById('dialogText1');
            const voiceBtn = document.getElementById('voiceBtn1');

            const state = { red: 'idle', blue: 'idle', completed: false };
            const sticksData = {
                red: { id: 'red', element: stickRed, wrapper: wrapperRed, target: 'elephant', color: 'red', placed: false },
                blue: { id: 'blue', element: stickBlue, wrapper: wrapperBlue, target: 'squirrel', color: 'blue',
                placed: false }
            };
            const dropZones = {
                elephant: { id: 'elephant', element: dropElephant, expected: 'red' },
                squirrel: { id: 'squirrel', element: dropSquirrel, expected: 'blue' }
            };

            function setDialogText(text, icon) {
                dialogText.textContent = text;
                const iconEl = document.querySelector('#dialogBox1 .dialog-icon');
                if (icon) iconEl.textContent = icon;
            }

            voiceBtn.addEventListener('click', function() {
                window.speakText(dialogText.textContent);
            });

            let dragState = { active: false, element: null, stickId: null, offsetX: 0, offsetY: 0, origRect: null };

            function getEventPos(e) {
                if (e.touches) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
                return { clientX: e.clientX, clientY: e.clientY };
            }

            function startDrag(e, stickId) {
                const stick = sticksData[stickId];
                if (!stick || stick.placed || state.completed) return;
                const el = stick.element;
                const rect = el.getBoundingClientRect();
                const pos = getEventPos(e);
                dragState.active = true;
                dragState.element = el;
                dragState.stickId = stickId;
                dragState.origRect = rect;
                dragState.offsetX = pos.clientX - rect.left;
                dragState.offsetY = pos.clientY - rect.top;
                el.classList.add('dragging');
                el.style.transition = 'none';
                document.body.style.overflow = 'hidden';
                for (const key of ['elephant', 'squirrel']) dropZones[key].element.classList.remove('highlight');
                e.preventDefault();
            }

            function moveDrag(e) {
                if (!dragState.active || !dragState.element) return;
                const pos = getEventPos(e);
                const el = dragState.element;
                const rect = dragState.origRect;
                const dx = pos.clientX - rect.left - dragState.offsetX;
                const dy = pos.clientY - rect.top - dragState.offsetY;
                el.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
                const elRect = el.getBoundingClientRect();
                const cx = elRect.left + elRect.width / 2,
                    cy = elRect.top + elRect.height / 2;
                for (const key of ['elephant', 'squirrel']) {
                    const zone = dropZones[key];
                    const zr = zone.element.getBoundingClientRect();
                    const over = (cx >= zr.left && cx <= zr.right && cy >= zr.top && cy <= zr.bottom);
                    zone.element.classList.toggle('highlight', over);
                }
                e.preventDefault();
            }

            function endDrag(e) {
                if (!dragState.active || !dragState.element) {
                    for (const key of ['elephant', 'squirrel']) dropZones[key].element.classList.remove('highlight');
                    return;
                }
                const el = dragState.element;
                const stickId = dragState.stickId;
                const stick = sticksData[stickId];
                el.classList.remove('dragging');
                document.body.style.overflow = '';
                for (const key of ['elephant', 'squirrel']) dropZones[key].element.classList.remove('highlight');
                const elRect = el.getBoundingClientRect();
                const cx = elRect.left + elRect.width / 2,
                    cy = elRect.top + elRect.height / 2;
                let targetKey = null;
                for (const key of ['elephant', 'squirrel']) {
                    const zr = dropZones[key].element.getBoundingClientRect();
                    if (cx >= zr.left && cx <= zr.right && cy >= zr.top && cy <= zr.bottom) { targetKey = key; break; }
                }
                if (targetKey) {
                    const expected = dropZones[targetKey].expected;
                    if (stickId === expected) {
                        // correct
                        const stick = sticksData[stickId];
                        const zone = dropZones[targetKey];
                        stick.placed = true;
                        state[stickId] = 'placed';
                        stick.wrapper.classList.add('hidden-stick');
                        const zoneEl = zone.element;
                        zoneEl.innerHTML = '';
                        const placedDiv = document.createElement('div');
                        placedDiv.className = 'placed-stick';
                        const inner = document.createElement('div');
                        inner.className = 'stick-inner stick-placed ' + stick.color;
                        placedDiv.appendChild(inner);
                        zoneEl.appendChild(placedDiv);
                        zoneEl.classList.add('correct-glow');
                        let msg = (targetKey === 'elephant') ? '太棒了！大象拿著長棒，跑得充滿力量！' :
                            '沒錯！小松鼠拿著短棒，動作真靈活！';
                        setDialogText(msg, '🌟');
                        if (state.red === 'placed' && state.blue === 'placed') {
                            setTimeout(function() {
                                window.showCelebration(
                                    '🏆🎉', '恭喜通關！', '', '🚀 前進下一關 ➡️',
                                    function() {
                                        window.hideCelebration();
                                        document.getElementById('level1').classList.add('hidden');
                                        document.getElementById('level2').classList.remove('hidden');
                                        if (window.resetLevel2) window.resetLevel2();
                                        const d2 = document.getElementById('dialogText2');
                                        if (d2) d2.textContent = '請將金牌拖拽給距離終點線最近的動物。';
                                    }
                                );
                            }, 900);

                        resetBarToPool(dragState.barId);
                    }
                    document.body.style.overflow = '';
                    dragState.active = false;
                    dragState.element = null;
                    dragState.barId = null;
                }
            });

            window.resetLevel3 = resetLevel3;
            resetLevel3();
            console.log('第三關已啟動（按鈕：查看獎狀）');
        })();
    </script>
